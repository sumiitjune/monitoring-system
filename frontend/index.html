<!DOCTYPE html>
<html>
<head>
  <title>Monitoring Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      width: 250px;
    }

    .bar {
      height: 20px;
      border-radius: 10px;
      background: #334155;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: green;
      transition: width 0.5s;
    }

    ul {
      text-align: left;
    }

    canvas {
      margin-top: 20px;
    }

    pre {
      text-align: left;
      font-size: 12px;
      background: black;
      padding: 10px;
      border-radius: 5px;
      height: 150px;
      overflow: auto;
    }
  </style>
</head>

<body>

<h1>Monitoring Dashboard</h1>

<div class="container">

  <div class="card">
    <h3>CPU Usage</h3>
    <div class="bar"><div id="cpuBar" class="fill"></div></div>
    <p id="cpuText">0%</p>
  </div>

  <div class="card">
    <h3>Memory Usage</h3>
    <div class="bar"><div id="memBar" class="fill"></div></div>
    <p id="memText">0%</p>
  </div>

  <div class="card">
    <h3>Disk Usage</h3>
    <div class="bar"><div id="diskBar" class="fill"></div></div>
    <p id="diskText">0%</p>
  </div>

  <div class="card">
    <h3>Containers</h3>
    <ul id="containers"></ul>
  </div>

  <div class="card">
    <h3>Logs</h3>
    <pre id="logs"></pre>
  </div>

</div>

<!-- Chart -->
<canvas id="cpuChart" width="400" height="200"></canvas>

<script>
function getColor(value) {
  if (value < 50) return "green";
  if (value < 80) return "orange";
  return "red";
}

let cpuData = [];
let labels = [];

const ctx = document.getElementById('cpuChart').getContext('2d');

const cpuChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'CPU Usage',
      data: cpuData,
      borderWidth: 2
    }]
  },
  options: {
    scales: {
      y: {
        beginAtZero: true,
        max: 100
      }
    }
  }
});

async function loadStats() {
  try {
    const res = await fetch("http://localhost:5002/stats");
    const data = await res.json();

    // CPU
    document.getElementById("cpuBar").style.width = data.cpu + "%";
    document.getElementById("cpuBar").style.background = getColor(data.cpu);
    document.getElementById("cpuText").innerText = data.cpu + "%";

    // Memory
    document.getElementById("memBar").style.width = data.memory + "%";
    document.getElementById("memBar").style.background = getColor(data.memory);
    document.getElementById("memText").innerText = data.memory + "%";

    // Disk
    document.getElementById("diskBar").style.width = data.disk + "%";
    document.getElementById("diskBar").style.background = getColor(data.disk);
    document.getElementById("diskText").innerText = data.disk + "%";

    // Containers
    const list = document.getElementById("containers");
    list.innerHTML = "";

    data.containers.forEach(container => {
      const li = document.createElement("li");
      li.innerText = container;
      list.appendChild(li);
    });

    // Logs (first container)
    if (data.containers.length > 0) {
      const containerName = data.containers[0];
      const logsRes = await fetch(`http://localhost:5002/logs/${containerName}`);


      let logsText = "";

      try {
        const logsData = await logsRes.json();
        logsText = logsData.logs;
      } catch {
        logsText = await logsRes.text();
      }

      document.getElementById("logs").innerText = logsText;
    }

    // Chart update
    let time = new Date().toLocaleTimeString();
    labels.push(time);
    cpuData.push(data.cpu);

    if (labels.length > 10) {
      labels.shift();
      cpuData.shift();
    }

    cpuChart.update();

    // Alert
    if (data.cpu > 80) {
      document.body.style.background = "darkred";
    } else {
      document.body.style.background = "#0f172a";
    }

  } catch (error) {
    console.error("Error:", error);
  }
}

// Auto refresh
setInterval(loadStats, 5000);
loadStats();
</script>

</body>
</html>
